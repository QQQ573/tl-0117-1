services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  mock-api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    profiles:
      - mock
